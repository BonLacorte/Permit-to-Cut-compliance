services:
  postgres:
    image: postgres:16-alpine
    container_name: grounds-compliance-postgres
    environment:
      POSTGRES_USER: grounds
      POSTGRES_PASSWORD: grounds
      POSTGRES_DB: grounds_compliance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grounds -d grounds_compliance"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
